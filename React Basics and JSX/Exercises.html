<!-- 1a. Using react, display a button on the website with the text "Good job" inside the button  -->

<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

        const div = (
            <div>
             <button>Good Job!</button>
            </div>
          );
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(div);
    </script>
  </body>
</html>

<!-- 1j.We'll create a clock. Continue from exercise li and do these steps:
First, instead of doing ReactDOM.createRoot(...).render(...); save the root in a Variable const root = ReactDOM.createRoot(...); and then do root. render(...);
Use the JavaScript code: setInterval(() => {... }, 1000);
(replace... with some code and it will run this code every second).
Inside setInterval, display the current time
on the website using root. render(...);
(setInterval will run this code every second
and this will create a clock). -->

 <!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src=" https://unpkg.com/supersimpledev/dayjs.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
    const time =   dayjs().format('HH:mm:ss')
    const para = <p> Current time{time}</p>      
      const container = document.querySelector('.js-container');
     const root =  ReactDOM.createRoot(container);
     root.render(para);

       setInterval(() => {
        const paragraph = <p>Current time: {dayjs().format('HH:mm:ss')}</p>;
        root.render(para);
      }, 1000);
    </script>
  </body>
</html>
