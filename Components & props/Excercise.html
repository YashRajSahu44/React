<!-- 2i. JavaScript has a feature called the ternary operator:
const
If value1 is true, then the result is value2. Else, the result is value3.
- This lets us insert an if-else statement directly in the JSX.
Update the previous exercise to use a ternary operator in the JSX. -->



<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ProductDetails({ name, price, discountPrice }) {
        return (
          <>
            <p>{name}</p>
            {discountPrice ? (
              <>
                <p><del>Price: ${price}</del></p>
                <p>Discount price: ${discountPrice}</p>
              </>
            ) : (
              <p>Price: ${price}</p>
            )}
            <button>Add to Cart</button>
          </>
        );
      }

      function App() {
        return (
          <>
            <ProductDetails
              name="Cotton socks"
              price="10.90"
              discountPrice="5.45"
            />
            <ProductDetails
              name="Tennis balls"
              price="6.00"
            />
            <ProductDetails
              name="Plain T-Shirt"
              price="7.99"
            />
          </>
        );
      }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
